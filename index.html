<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Lapangan Futsal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏟️ Booking Lapangan Futsal</h1>
            <p>Pilih slot waktu dari 08:00 - 22:00</p>
        </header>

        <div id="scheduleGrid" class="schedule-grid">
            </div>

        <div id="bookingModal" class="modal">
            <div class="modal-content">
                <h2>Booking Slot</h2>
                <p id="slotTime"></p>
                <input type="text" id="customerName" placeholder="Masukkan nama lengkap" maxlength="50">
                <div class="modal-buttons">
                    <button id="confirmBtn">✅ Booking</button>
                    <button id="cancelBtn">❌ Batal</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
